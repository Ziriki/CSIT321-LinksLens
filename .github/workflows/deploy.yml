name: Deploy to AWS
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Go to the project folder
            cd ~/linkslens-fyp
            
            # 2. Force the server to match GitHub exactly
            git fetch --all
            git reset --hard origin/main
            
            # 3. Update Marketing Site (Copy files from Repo to Nginx folder)
            sudo mkdir -p /var/www/linkslens
            sudo cp -r /home/ubuntu/linkslens-fyp/website/* /var/www/linkslens/
            
            # 4. Rebuild and Restart Docker
            # This only restarts containers that had code changes
            docker compose up -d --build --remove-orphans
            
            # 5. Clean up old images to save space
            docker image prune -f
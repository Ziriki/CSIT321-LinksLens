<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Reset Password | LinksLens</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1565c0',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <div class="mb-8 text-center">
            <a href="/" class="inline-flex items-center gap-3">
                <img src="images/logo.svg" alt="LinksLens" class="h-10 w-10 rounded-lg bg-white">
                <span class="text-2xl font-bold tracking-tight">LinksLens</span>
            </a>
        </div>

        <div class="rounded-2xl border border-gray-800 bg-gray-900 p-8 shadow-xl">

            <h1 class="mb-2 text-2xl font-bold">Reset Password</h1>
            <p class="mb-6 text-sm text-gray-400">
                Choose a new password for your account.
            </p>

            <form id="resetForm" novalidate>
                <div class="mb-4">
                    <label for="password" class="mb-1.5 block text-sm font-medium text-gray-300">
                        New Password
                    </label>
                    <input
                        id="password"
                        type="password"
                        autocomplete="new-password"
                        required
                        minlength="8"
                        placeholder="At least 8 characters"
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-5">
                    <label for="confirm" class="mb-1.5 block text-sm font-medium text-gray-300">
                        Confirm New Password
                    </label>
                    <input
                        id="confirm"
                        type="password"
                        autocomplete="new-password"
                        required
                        placeholder="Re-enter your new password"
                        class="w-full rounded-lg border border-gray-700 bg-gray-800 px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    >
                </div>

                <div id="feedback" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                    Reset Password
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                <a href="/" class="font-medium text-blue-400 hover:text-blue-300">Back to app</a>
            </p>
        </div>

    </div>

    <script>
        const API = "https://api.linkslens.com";

        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        const form = document.getElementById("resetForm");
        const submitBtn = document.getElementById("submitBtn");
        const feedback = document.getElementById("feedback");

        function showMessage(msg, isError) {
            feedback.textContent = msg;
            feedback.className = isError
                ? "mb-4 rounded-lg px-4 py-3 text-sm bg-red-900/50 border border-red-700 text-red-300"
                : "mb-4 rounded-lg px-4 py-3 text-sm bg-green-900/50 border border-green-700 text-green-300";
            feedback.classList.remove("hidden");
        }

        if (!token) {
            submitBtn.disabled = true;
            showMessage("Invalid or missing reset link. Please request a new password reset.", true);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            if (!token) return;

            const pw = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;

            if (!pw || !confirm) {
                showMessage("Please fill in both password fields.", true);
                return;
            }
            if (pw.length < 8) {
                showMessage("Password must be at least 8 characters.", true);
                return;
            }
            if (pw !== confirm) {
                showMessage("Passwords do not match.", true);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Resetting…";
            feedback.classList.add("hidden");

            try {
                const res = await fetch(`${API}/api/accounts/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ Token: token, NewPassword: pw }),
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage(data.message ?? "Password successfully updated. You may now log in.", false);
                    form.reset();
                } else {
                    showMessage(data.detail ?? "Something went wrong. Please try again.", true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Reset Password";
                }
            } catch (_) {
                showMessage("Network error. Please check your connection and try again.", true);
                submitBtn.disabled = false;
                submitBtn.textContent = "Reset Password";
            }
        });
    </script>

</body>
</html>

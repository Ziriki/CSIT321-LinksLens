<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Forgot Password | LinksLens</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1565c0',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 flex items-center justify-center px-4">

    <div class="w-full max-w-md">

        <div class="mb-8 text-center">
            <a href="/" class="inline-flex items-center gap-3">
                <img src="images/logo.svg" alt="LinksLens" class="h-10 w-10 rounded-lg bg-white">
                <span class="text-2xl font-bold tracking-tight">LinksLens</span>
            </a>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-xl">

            <h1 class="mb-2 text-2xl font-bold">Forgot Password</h1>
            <p class="mb-6 text-sm text-gray-500">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            <form id="forgotForm" novalidate>
                <div class="mb-5">
                    <label for="email" class="mb-1.5 block text-sm font-medium text-gray-700">
                        Email Address
                    </label>
                    <input
                        id="email"
                        type="email"
                        autocomplete="email"
                        required
                        placeholder="you@example.com"
                        class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    >
                </div>

                <div id="feedback" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                    Send Reset Link
                </button>
            </form>

        </div>

    </div>

    <script>
        const API = "https://api.linkslens.com";

        const form = document.getElementById("forgotForm");
        const submitBtn = document.getElementById("submitBtn");
        const feedback = document.getElementById("feedback");

        function showMessage(msg, isError) {
            feedback.textContent = msg;
            feedback.className = isError
                ? "mb-4 rounded-lg px-4 py-3 text-sm bg-red-50 border border-red-300 text-red-700"
                : "mb-4 rounded-lg px-4 py-3 text-sm bg-green-50 border border-green-300 text-green-700";
            feedback.classList.remove("hidden");
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            if (!email) {
                showMessage("Please enter your email address.", true);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Sending…";
            feedback.classList.add("hidden");

            try {
                await fetch(`${API}/api/accounts/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ EmailAddress: email }),
                });
            } catch (_) {} // Intentionally swallowed — always show the same message

            // Always show generic message regardless of outcome (no enumeration)
            showMessage(
                "If that email exists in our system, a password reset link has been sent. Check your inbox.",
                false
            );
            form.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = "Send Reset Link";
        });
    </script>

</body>
</html>
